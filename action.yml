name: 'Skill Eval'
description: 'Evaluate Claude Code skills against YAML test cases with automated grading and PR reporting'
author: 'Nick Nikolakakis'

branding:
  icon: 'check-circle'
  color: 'orange'

inputs:
  skill-name:
    description: 'Name of the skill to evaluate'
    required: true
  skill-path:
    description: 'Path to the skill directory (containing SKILL.md and evals/)'
    required: true
  anthropic-api-key:
    description: 'Anthropic API key for claude CLI'
    required: true
  pass-threshold:
    description: 'Minimum pass rate (0-100) to succeed'
    required: false
    default: '80'
  timeout:
    description: 'Timeout per eval case in seconds'
    required: false
    default: '120'
  post-comment:
    description: 'Post results as a PR comment'
    required: false
    default: 'true'
  github-token:
    description: 'GitHub token for posting PR comments'
    required: false
    default: ${{ github.token }}
  upload-viewer:
    description: 'Upload eval-viewer HTML as an artifact'
    required: false
    default: 'true'
  node-version:
    description: 'Node.js version for claude CLI installation'
    required: false
    default: '22'
  model:
    description: 'Claude model to use for eval and grading (e.g. claude-sonnet-4-6)'
    required: false
    default: ''
  write-summary:
    description: 'Write results to GitHub Step Summary'
    required: false
    default: 'true'
  max-retries:
    description: 'Max retry attempts per API call on timeout/error'
    required: false
    default: '3'
  retry-delay:
    description: 'Base delay between retries in seconds (multiplied by attempt number)'
    required: false
    default: '10'

outputs:
  pass-rate:
    description: 'Overall pass rate as percentage (0-100)'
    value: ${{ steps.eval.outputs.pass_rate }}
  passed:
    description: 'Total criteria passed'
    value: ${{ steps.eval.outputs.passed }}
  total:
    description: 'Total criteria evaluated'
    value: ${{ steps.eval.outputs.total }}
  cases-run:
    description: 'Number of eval cases executed'
    value: ${{ steps.eval.outputs.cases_run }}

runs:
  using: 'composite'
  steps:
    # Mask the API key before anything else
    - name: Mask secrets
      shell: bash
      run: echo "::add-mask::$ANTHROPIC_API_KEY"
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}

    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.13'

    - name: Install dependencies
      shell: bash
      run: |
        pip install pyyaml --quiet
        npm install -g @anthropic-ai/claude-code --quiet 2>/dev/null || true
        claude --version || { echo "::error::Failed to install claude CLI"; exit 1; }

    - name: Run eval pipeline
      id: eval
      shell: bash
      run: python "$GITHUB_ACTION_PATH/scripts/eval.py"
      env:
        GITHUB_ACTION_PATH: ${{ github.action_path }}
        SKILL_NAME: ${{ inputs.skill-name }}
        SKILL_PATH: ${{ inputs.skill-path }}
        EVAL_TIMEOUT: ${{ inputs.timeout }}
        PASS_THRESHOLD: ${{ inputs.pass-threshold }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        WORKSPACE: ${{ runner.temp }}/skill-eval/${{ inputs.skill-name }}
        MAX_RETRIES: ${{ inputs.max-retries }}
        RETRY_DELAY: ${{ inputs.retry-delay }}
        MODEL: ${{ inputs.model }}
        WRITE_SUMMARY: ${{ inputs.write-summary }}

    - name: Generate eval viewer
      if: inputs.upload-viewer == 'true'
      shell: bash
      run: python "$GITHUB_ACTION_PATH/scripts/generate_viewer.py"
      env:
        GITHUB_ACTION_PATH: ${{ github.action_path }}
        WORKSPACE: ${{ runner.temp }}/skill-eval/${{ inputs.skill-name }}
        SKILL_NAME: ${{ inputs.skill-name }}
        TEMPLATE_PATH: ${{ github.action_path }}/scripts/viewer.html

    - name: Rename viewer with timestamp
      if: inputs.upload-viewer == 'true'
      id: artifact-name
      shell: bash
      run: |
        TIMESTAMP=$(date -u '+%Y%m%dT%H%M%S')
        ARTIFACT_NAME="${TIMESTAMP}-${SKILL_NAME}"
        mv "${WORKSPACE}/viewer.html" "${WORKSPACE}/${ARTIFACT_NAME}.html"
        echo "name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
        echo "path=${WORKSPACE}/${ARTIFACT_NAME}.html" >> "$GITHUB_OUTPUT"
      env:
        SKILL_NAME: ${{ inputs.skill-name }}
        WORKSPACE: ${{ runner.temp }}/skill-eval/${{ inputs.skill-name }}

    - name: Upload eval viewer
      if: inputs.upload-viewer == 'true'
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
        name: ${{ steps.artifact-name.outputs.name }}
        path: ${{ steps.artifact-name.outputs.path }}
        retention-days: 30

    - name: Post PR comment
      if: inputs.post-comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      run: python "$GITHUB_ACTION_PATH/scripts/post_comment.py"
      env:
        GITHUB_ACTION_PATH: ${{ github.action_path }}
        WORKSPACE: ${{ runner.temp }}/skill-eval/${{ inputs.skill-name }}
        SKILL_NAME: ${{ inputs.skill-name }}
        PASS_THRESHOLD: ${{ inputs.pass-threshold }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}

    - name: Check pass threshold
      shell: bash
      run: python "$GITHUB_ACTION_PATH/scripts/check_threshold.py"
      env:
        GITHUB_ACTION_PATH: ${{ github.action_path }}
        PASS_RATE: ${{ steps.eval.outputs.pass_rate }}
        PASS_THRESHOLD: ${{ inputs.pass-threshold }}
